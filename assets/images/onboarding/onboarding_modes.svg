<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#F2D5DE" opacity="0.4"/>
  <!-- Card 1 - Work mode (back, offset) -->
  <g transform="translate(-8, -4) rotate(-6, 100, 100)">
    <rect x="40" y="42" width="120" height="44" rx="12" ry="12" fill="#FFFFFF" stroke="#E6B3C0" stroke-width="2"/>
    <circle cx="62" cy="64" r="14" fill="#F2D5DE"/>
    <!-- Briefcase icon -->
    <rect x="55" y="60" width="14" height="10" rx="2" ry="2" fill="#B34D6A"/>
    <rect x="59" y="56" width="6" height="5" rx="1" ry="1" fill="none" stroke="#B34D6A" stroke-width="1.5"/>
    <text x="88" y="60" font-family="sans-serif" font-size="10" font-weight="bold" fill="#666666">Work</text>
    <!-- Toggle ON -->
    <rect x="130" y="56" width="22" height="14" rx="7" ry="7" fill="#800020"/>
    <circle cx="145" cy="63" r="5" fill="#FFFFFF"/>
  </g>
  <!-- Card 2 - Study mode (middle) -->
  <g>
    <rect x="40" y="80" width="120" height="44" rx="12" ry="12" fill="#FFFFFF" stroke="#800020" stroke-width="2.5"/>
    <circle cx="62" cy="102" r="14" fill="#800020" opacity="0.15"/>
    <!-- Book icon -->
    <path d="M55 96 L62 93 L69 96 L69 110 L62 107 L55 110 Z" fill="#800020"/>
    <line x1="62" y1="93" x2="62" y2="107" stroke="#FFFFFF" stroke-width="1"/>
    <text x="88" y="98" font-family="sans-serif" font-size="10" font-weight="bold" fill="#800020">Study</text>
    <!-- Toggle ON -->
    <rect x="130" y="94" width="22" height="14" rx="7" ry="7" fill="#800020"/>
    <circle cx="145" cy="101" r="5" fill="#FFFFFF"/>
  </g>
  <!-- Card 3 - Sleep mode (front, offset) -->
  <g transform="translate(8, 4) rotate(4, 100, 100)">
    <rect x="40" y="118" width="120" height="44" rx="12" ry="12" fill="#FFFFFF" stroke="#E6B3C0" stroke-width="2"/>
    <circle cx="62" cy="140" r="14" fill="#F2D5DE"/>
    <!-- Moon icon -->
    <path d="M56 134 A10 10 0 1 0 68 146 A8 8 0 1 1 56 134" fill="#B34D6A"/>
    <text x="88" y="136" font-family="sans-serif" font-size="10" font-weight="bold" fill="#666666">Sleep</text>
    <!-- Toggle OFF -->
    <rect x="130" y="132" width="22" height="14" rx="7" ry="7" fill="#CCCCCC"/>
    <circle cx="137" cy="139" r="5" fill="#FFFFFF"/>
  </g>
  <!-- Decorative elements -->
  <circle cx="28" cy="80" r="5" fill="#E6B3C0" opacity="0.6"/>
  <circle cx="172" cy="120" r="7" fill="#E6B3C0" opacity="0.5"/>
  <circle cx="168" cy="56" r="4" fill="#B34D6A" opacity="0.4"/>
  <circle cx="30" cy="150" r="3" fill="#B34D6A" opacity="0.5"/>
</svg>