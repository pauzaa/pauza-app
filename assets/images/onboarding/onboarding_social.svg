<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#F2D5DE" opacity="0.4"/>
  <!-- Podium - 2nd place (left) -->
  <rect x="32" y="118" width="44" height="52" rx="6" ry="6" fill="#B34D6A"/>
  <text x="54" y="148" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
  <!-- Podium - 1st place (center, tallest) -->
  <rect x="78" y="94" width="44" height="76" rx="6" ry="6" fill="#800020"/>
  <text x="100" y="134" font-family="sans-serif" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
  <!-- Podium - 3rd place (right) -->
  <rect x="124" y="132" width="44" height="38" rx="6" ry="6" fill="#E6B3C0"/>
  <text x="146" y="156" font-family="sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
  <!-- Person 2 (left podium) -->
  <circle cx="54" cy="96" r="14" fill="#FFFFFF" stroke="#B34D6A" stroke-width="2.5"/>
  <circle cx="54" cy="92" r="6" fill="#B34D6A"/>
  <path d="M44 104 C44 98 64 98 64 104" fill="#B34D6A"/>
  <!-- Person 1 (center podium - winner) -->
  <circle cx="100" cy="70" r="16" fill="#FFFFFF" stroke="#800020" stroke-width="2.5"/>
  <circle cx="100" cy="66" r="7" fill="#800020"/>
  <path d="M88 78 C88 72 112 72 112 78" fill="#800020"/>
  <!-- Trophy/crown on winner -->
  <path d="M91 48 L95 56 L100 50 L105 56 L109 48" stroke="#800020" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="100" cy="46" r="2" fill="#800020"/>
  <!-- Person 3 (right podium) -->
  <circle cx="146" cy="112" r="12" fill="#FFFFFF" stroke="#E6B3C0" stroke-width="2.5"/>
  <circle cx="146" cy="109" r="5.5" fill="#B34D6A" opacity="0.6"/>
  <path d="M138 119 C138 114 154 114 154 119" fill="#B34D6A" opacity="0.6"/>
  <!-- Floor line -->
  <rect x="24" y="168" width="152" height="4" rx="2" ry="2" fill="#E6B3C0" opacity="0.5"/>
  <!-- Celebration particles -->
  <circle cx="70" cy="42" r="3" fill="#E6B3C0" opacity="0.7"/>
  <circle cx="130" cy="38" r="2.5" fill="#B34D6A" opacity="0.5"/>
  <circle cx="36" cy="60" r="2" fill="#800020" opacity="0.4"/>
  <circle cx="164" cy="70" r="3" fill="#E6B3C0" opacity="0.6"/>
  <rect x="78" y="34" width="4" height="4" rx="1" fill="#B34D6A" opacity="0.5" transform="rotate(30, 80, 36)"/>
  <rect x="118" y="30" width="3.5" height="3.5" rx="1" fill="#800020" opacity="0.4" transform="rotate(45, 120, 32)"/>
</svg>