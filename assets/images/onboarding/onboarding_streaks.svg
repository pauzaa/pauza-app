  <rect x="56" y="128" width="20" height="32" rx="4" ry="4" fill="#E6B3C0"/>
  <rect x="82" y="112" width="20" height="48" rx="4" ry="4" fill="#B34D6A"/>
  <rect x="108" y="96" width="20" height="64" rx="4" ry="4" fill="#B34D6A"/>
  <rect x="134" y="76" width="20" height="84" rx="4" ry="4" fill="#800020"/>
  <!-- Checkmarks on bars -->
  <path d="M36 148 L39 152 L46 145" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M62 138 L65 142 L72 135" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M88 124 L91 128 L98 121" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M114 108 L117 112 L124 105" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M140 88 L143 92 L150 85" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Flame icon above tallest bar -->
  <path d="M144 68 C144 48 132 44 138 28 C142 40 154 42 154 56 C154 64 150 68 148 70 C150 64 148 56 144 52 C144 58 140 64 140 68 C140 72 142 74 144 74 C146 74 148 72 148 68" fill="#800020"/>
  <path d="M144 68 C144 62 142 58 144 52 C144 58 148 62 148 66 C148 70 146 72 144 72 C142 72 142 70 144 68" fill="#B34D6A"/>
  <!-- Rising trend line -->
  <path d="M38 138 L66 126 L92 110 L118 94 L144 74" stroke="#800020" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Star sparkles -->
  <g fill="#800020" opacity="0.5">
    <path d="M164 44 L166 48 L170 50 L166 52 L164 56 L162 52 L158 50 L162 48 Z"/>
    <path d="M28 68 L29.5 71 L32.5 72.5 L29.5 74 L28 77 L26.5 74 L23.5 72.5 L26.5 71 Z" transform="scale(0.8) translate(8, 12)"/>
