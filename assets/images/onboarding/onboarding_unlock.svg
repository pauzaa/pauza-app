<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#F2D5DE" opacity="0.4"/>
  <!-- Phone body -->
  <rect x="50" y="32" width="72" height="136" rx="14" ry="14" fill="#FFFFFF" stroke="#800020" stroke-width="3"/>
  <!-- Screen area -->
  <rect x="58" y="50" width="56" height="98" rx="4" ry="4" fill="#F5F5F5"/>
  <!-- Top notch -->
  <rect x="72" y="38" width="28" height="5" rx="2.5" ry="2.5" fill="#E6B3C0"/>
  <!-- Home indicator -->
  <rect x="74" y="156" width="24" height="4" rx="2" ry="2" fill="#E6B3C0"/>
  <!-- NFC icon on screen -->
  <circle cx="86" cy="96" r="8" fill="#800020"/>
  <path d="M86 96 L86 96" fill="none"/>
  <!-- NFC symbol on phone -->
  <path d="M80 84 A14 14 0 0 1 92 84" stroke="#800020" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M76 78 A22 22 0 0 1 96 78" stroke="#800020" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M72 72 A30 30 0 0 1 100 72" stroke="#800020" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Tap/touch text on screen -->
  <rect x="66" y="110" width="40" height="16" rx="8" ry="8" fill="#800020" opacity="0.15"/>
  <circle cx="76" cy="118" r="3" fill="#800020" opacity="0.6"/>
  <rect x="82" y="116" width="18" height="4" rx="2" fill="#800020" opacity="0.4"/>
  <!-- NFC waves emanating outward to the right -->
  <path d="M126 88 A20 20 0 0 1 126 112" stroke="#800020" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M136 80 A30 30 0 0 1 136 120" stroke="#800020" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
  <path d="M146 72 A40 40 0 0 1 146 128" stroke="#800020" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.3"/>
  <!-- NFC tag/card -->
  <g transform="translate(148, 84)">
    <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="#800020" opacity="0.9"/>
    <!-- NFC symbol on tag -->
    <path d="M10 20 A8 8 0 0 1 22 20" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" fill="none" transform="rotate(180, 16, 16)"/>
    <path d="M13 18 A5 5 0 0 1 19 18" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" fill="none" transform="rotate(180, 16, 16)"/>
    <circle cx="16" cy="18" r="2" fill="#FFFFFF"/>
  </g>
  <!-- Decorative dots -->
  <circle cx="32" cy="56" r="5" fill="#E6B3C0" opacity="0.6"/>
  <circle cx="36" cy="140" r="4" fill="#B34D6A" opacity="0.4"/>
  <circle cx="176" cy="54" r="3" fill="#E6B3C0" opacity="0.5"/>
  <circle cx="172" cy="148" r="6" fill="#E6B3C0" opacity="0.5"/>
</svg>